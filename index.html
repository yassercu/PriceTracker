<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceTracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-top">
                <h1>PriceTracker</h1>
                <p class="tagline">Compara precios y encuentra dónde comprar mejor</p>
            </div>
            <div class="search-container">
                <input type="search" id="searchInput" placeholder="Buscar productos para comparar..." autocomplete="off">
                <button id="clearSearchBtn" class="clear-btn" aria-label="Limpiar búsqueda">✕</button>
            </div>
            <div class="controls">
                <label for="sortSelect" class="sr-only">Ordenar por</label>
                <select id="sortSelect">
                    <option value="pricePerUnit">Mejor precio / unidad</option>
                    <option value="price">Precio total</option>
                    <option value="date">Más reciente</option>
                </select>
                <label for="storeFilter" class="sr-only">Filtrar por tienda</label>
                <select id="storeFilter">
                    <option value="">Todas las tiendas</option>
                </select>
                <button id="denseToggle" type="button" title="Modo denso" aria-pressed="false">Denso</button>
            </div>
            <div id="statsBar" class="stats-bar" hidden></div>
        </header>

        <main>
            <div id="productsList" aria-live="polite"></div>
        </main>

        <button id="addProductBtn" class="fab" title="Añadir precio" aria-label="Añadir precio">+</button>

        <div id="productModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal-content">
                <button type="button" class="close" aria-label="Cerrar">&times;</button>
                <h2 id="modalTitle">Añadir precio</h2>
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="form-group">
                        <label for="productName">Producto</label>
                        <input type="text" id="productName" list="productSuggestions" required autocomplete="off" placeholder="Ej: Leche entera">
                        <datalist id="productSuggestions"></datalist>
                    </div>
                    <div class="form-group">
                        <label for="storeName">Tienda</label>
                        <input type="text" id="storeName" list="storeSuggestions" required autocomplete="off" placeholder="Selecciona o escribe una tienda">
                        <datalist id="storeSuggestions"></datalist>
                        <div id="storeChips" class="store-chips" aria-label="Tiendas existentes"></div>
                    </div>
                    <div class="form-group">
                        <label for="price">Precio (€)</label>
                        <input type="text" id="price" required pattern="[0-9]+([.,][0-9]{1,2})?" inputmode="decimal" placeholder="1,99">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="unitQty">Cantidad</label>
                            <input type="number" id="unitQty" step="any" placeholder="1">
                        </div>
                        <div class="form-group">
                            <label for="unitLabel">Unidad</label>
                            <select id="unitLabel">
                                <option value="">Sin unidad</option>
                                <option value="kg">kg</option>
                                <option value="g">g</option>
                                <option value="L">L</option>
                                <option value="ml">ml</option>
                                <option value="u">u</option>
                                <option value="paquete">paquete</option>
                            </select>
                        </div>
                    </div>
                    <p class="form-hint">La cantidad y unidad permiten comparar precios normalizados (€/kg, €/L...)</p>
                    <div id="ppuPreview" class="ppu-preview" hidden></div>
                    <div id="duplicateWarning" class="duplicate-warning" hidden></div>
                    <button type="submit" id="saveProductBtn">Guardar</button>
                </form>
            </div>
        </div>

        <footer>
            <button id="exportBtn" type="button">Exportar</button>
            <button id="importBtn" type="button">Importar</button>
            <input type="file" id="importFile" accept=".json" hidden>
        </footer>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
